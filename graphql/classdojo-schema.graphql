"""
ClassDojo Conceptual GraphQL Schema
Provider: ClassDojo (https://www.classdojo.com)
Description: Classroom communication and student engagement platform schema
covering classes, teachers, students, parents, messaging, behavior tracking,
portfolios, attendance, lessons, and developer integration primitives.
Note: ClassDojo does not currently publish a public GraphQL or REST API.
This schema is conceptual, derived from documented platform features.
"""

scalar DateTime
scalar Date
scalar URL
scalar JSON

# ─────────────────────────────────────────
# Enums
# ─────────────────────────────────────────

enum PointPolarity {
  POSITIVE
  NEEDS_WORK
}

enum AttendanceStatus {
  PRESENT
  ABSENT
  LATE
  EXCUSED
}

enum MessageStatus {
  SENT
  DELIVERED
  READ
}

enum WebhookEvent {
  POINT_AWARDED
  STUDENT_ADDED
  MESSAGE_SENT
  ATTENDANCE_RECORDED
  PORTFOLIO_ITEM_ADDED
  STORY_POST_CREATED
}

enum TokenType {
  ACCESS
  REFRESH
}

enum WidgetType {
  NOISE_METER
  TIMER
  RANDOM_PICKER
  GROUP_MAKER
  MUSIC_PLAYER
  WHOLE_CLASS_POINTS
  ATTENDANCE
}

# ─────────────────────────────────────────
# Class Domain
# ─────────────────────────────────────────

"""A ClassDojo classroom managed by a teacher."""
type Class {
  id: ID!
  name: String!
  grade: String
  subject: String
  teacher: Teacher!
  students: [Student!]!
  code: ClassCode
  school: School
  story: ClassStory
  attendance: [Attendance!]!
  groups: [Group!]!
  events: [Event!]!
  pointTypes: [PointType!]!
  toolkit: Toolkit
  createdAt: DateTime!
  updatedAt: DateTime!
  details: ClassDetails
}

"""Extended metadata for a ClassDojo class."""
type ClassDetails {
  id: ID!
  class: Class!
  totalStudents: Int!
  totalPoints: Int!
  activeStudents: Int!
  averagePoints: Float
  behaviorCategories: [BehaviorCategory!]!
  language: String
  timezone: String
  archived: Boolean!
}

"""Join code allowing students and parents to connect to a class."""
type ClassCode {
  id: ID!
  code: String!
  class: Class!
  type: String!
  expiresAt: DateTime
  createdAt: DateTime!
}

# ─────────────────────────────────────────
# Teacher Domain
# ─────────────────────────────────────────

"""A teacher account on ClassDojo."""
type Teacher {
  id: ID!
  firstName: String!
  lastName: String!
  email: String!
  classes: [Class!]!
  school: School
  toolkit: Toolkit
  info: TeacherInfo
  details: TeacherDetails
  webhooks: [Webhook!]!
  apiKeys: [APIKey!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Extended profile and preference data for a teacher."""
type TeacherDetails {
  id: ID!
  teacher: Teacher!
  bio: String
  profileImageURL: URL
  gradesTaught: [String!]!
  subjectsTaught: [String!]!
  yearsExperience: Int
  notificationPreferences: JSON
  defaultPointTypes: [PointType!]!
  locale: String
  timezone: String
}

"""Public-facing teacher information visible to parents and students."""
type TeacherInfo {
  id: ID!
  teacher: Teacher!
  displayName: String!
  title: String
  profileImageURL: URL
  schoolName: String
}

# ─────────────────────────────────────────
# Student Domain
# ─────────────────────────────────────────

"""A student enrolled in one or more ClassDojo classes."""
type Student {
  id: ID!
  firstName: String!
  lastName: String
  displayName: String!
  class: Class!
  points: Int!
  behaviors: [Behavior!]!
  portfolio: Portfolio
  attendance: [AttendanceRecord!]!
  moments: [Moment!]!
  badges: [Badge!]!
  parents: [ParentChild!]!
  report: StudentReport
  details: StudentDetails
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Extended profile and aggregate data for a student."""
type StudentDetails {
  id: ID!
  student: Student!
  profileImageURL: URL
  totalPositivePoints: Int!
  totalNeedsWorkPoints: Int!
  currentStreak: Int
  longestStreak: Int
  skillSummary: [SkillDetails!]!
  attendanceSummary: JSON
  lastActiveAt: DateTime
}

"""Aggregated behavior and performance report for a student."""
type StudentReport {
  id: ID!
  student: Student!
  startDate: Date!
  endDate: Date!
  totalPoints: Int!
  positivePoints: Int!
  needsWorkPoints: Int!
  attendanceSummary: JSON
  behaviorBreakdown: [PointDetails!]!
  skillReports: [SkillReport!]!
  generatedAt: DateTime!
}

# ─────────────────────────────────────────
# Parent and Guardian Domain
# ─────────────────────────────────────────

"""A parent or family member account on ClassDojo."""
type Parent {
  id: ID!
  firstName: String!
  lastName: String!
  email: String
  phone: String
  children: [ParentChild!]!
  messageThreads: [MessageThread!]!
  details: ParentDetails
  guardianRecord: Guardian
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Extended profile and preference data for a parent account."""
type ParentDetails {
  id: ID!
  parent: Parent!
  profileImageURL: URL
  preferredLanguage: String
  notificationPreferences: JSON
  locale: String
  timezone: String
  hasCompletedOnboarding: Boolean!
}

"""Relationship record linking a parent account to a student."""
type ParentChild {
  id: ID!
  parent: Parent!
  student: Student!
  relationship: String
  approvedAt: DateTime
  createdAt: DateTime!
}

"""Legal guardian record associated with a student."""
type Guardian {
  id: ID!
  firstName: String!
  lastName: String!
  relationship: String!
  student: Student!
  parent: Parent
  details: GuardianDetails
  createdAt: DateTime!
}

"""Extended information for a legal guardian."""
type GuardianDetails {
  id: ID!
  guardian: Guardian!
  email: String
  phone: String
  address: String
  emergencyContact: Boolean!
  custodyNotes: String
  preferredLanguage: String
}

# ─────────────────────────────────────────
# School Domain
# ─────────────────────────────────────────

"""A school institution on ClassDojo."""
type School {
  id: ID!
  name: String!
  address: String
  city: String
  state: String
  country: String
  classes: [Class!]!
  teachers: [Teacher!]!
  directory: SchoolDirectory
  details: SchoolDetails
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Extended metadata and configuration for a school."""
type SchoolDetails {
  id: ID!
  school: School!
  principalName: String
  districtName: String
  studentCount: Int
  teacherCount: Int
  gradeRange: String
  website: URL
  phone: String
  timezone: String
  locale: String
}

"""A directory listing of teachers within a school."""
type SchoolDirectory {
  id: ID!
  school: School!
  teachers: [TeacherInfo!]!
  totalTeachers: Int!
  updatedAt: DateTime!
}

# ─────────────────────────────────────────
# Messaging Domain
# ─────────────────────────────────────────

"""An individual message within a thread."""
type Message {
  id: ID!
  thread: MessageThread!
  senderType: String!
  senderId: ID!
  body: String!
  status: MessageStatus!
  translatedBody: String
  translationLanguage: String
  attachments: [URL!]!
  sentAt: DateTime!
  details: MessageDetails
}

"""Extended metadata for a message including translation and read receipts."""
type MessageDetails {
  id: ID!
  message: Message!
  originalLanguage: String
  translationAvailable: Boolean!
  readAt: DateTime
  deliveredAt: DateTime
  isAutomated: Boolean!
  attachmentCount: Int!
}

"""A conversation thread between a teacher and a parent."""
type MessageThread {
  id: ID!
  teacher: Teacher!
  parent: Parent!
  student: Student
  messages: [Message!]!
  lastMessageAt: DateTime
  unreadCount: Int!
  createdAt: DateTime!
}

"""A one-to-one direct message outside of a class context."""
type DirectMessage {
  id: ID!
  fromId: ID!
  fromType: String!
  toId: ID!
  toType: String!
  body: String!
  translatedBody: String
  status: MessageStatus!
  sentAt: DateTime!
  readAt: DateTime
}

# ─────────────────────────────────────────
# Story Domain
# ─────────────────────────────────────────

"""The class-wide story feed where teachers post updates for families."""
type ClassStory {
  id: ID!
  class: Class!
  posts: [StoryPost!]!
  totalPosts: Int!
  createdAt: DateTime!
}

"""A single post in a class story feed."""
type StoryPost {
  id: ID!
  story: ClassStory!
  teacher: Teacher!
  body: String
  mediaURLs: [URL!]!
  comments: [StoryComment!]!
  likeCount: Int!
  postedAt: DateTime!
  updatedAt: DateTime!
}

"""A comment left by a parent on a class story post."""
type StoryComment {
  id: ID!
  post: StoryPost!
  authorId: ID!
  authorType: String!
  body: String!
  translatedBody: String
  postedAt: DateTime!
}

# ─────────────────────────────────────────
# Portfolio Domain
# ─────────────────────────────────────────

"""A student's work portfolio visible to their family."""
type Portfolio {
  id: ID!
  student: Student!
  items: [PortfolioItem!]!
  totalItems: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""An individual item within a student's portfolio."""
type PortfolioItem {
  id: ID!
  portfolio: Portfolio!
  title: String
  description: String
  mediaURL: URL!
  mediaType: String!
  subject: String
  skill: SkillDetails
  addedBy: Teacher!
  addedAt: DateTime!
}

# ─────────────────────────────────────────
# Points and Behavior Domain
# ─────────────────────────────────────────

"""A point awarded to a student for a specific behavior."""
type DojoPoint {
  id: ID!
  student: Student!
  teacher: Teacher!
  class: Class!
  polarity: PointPolarity!
  value: Int!
  pointType: PointType!
  behavior: Behavior
  awardedAt: DateTime!
  details: PointDetails
}

"""Extended metadata for a Dojo point award."""
type PointDetails {
  id: ID!
  point: DojoPoint!
  note: String
  groupId: ID
  sessionId: ID
  isCustom: Boolean!
  awardedVia: String
}

"""A skill or behavior label used when awarding points."""
type PointType {
  id: ID!
  class: Class!
  name: String!
  polarity: PointPolarity!
  iconURL: URL
  color: String
  category: BehaviorCategory
  isDefault: Boolean!
  totalAwarded: Int!
  createdAt: DateTime!
}

"""A behavior feedback event tied to a point award."""
type Behavior {
  id: ID!
  student: Student!
  class: Class!
  pointType: PointType!
  polarity: PointPolarity!
  points: Int!
  recordedAt: DateTime!
  details: BehaviorDetails
}

"""Extended metadata for a behavior feedback event."""
type BehaviorDetails {
  id: ID!
  behavior: Behavior!
  teacherNote: String
  parentVisible: Boolean!
  sessionContext: String
  deviceType: String
}

"""A grouping of related behavior or skill point types."""
type BehaviorCategory {
  id: ID!
  class: Class!
  name: String!
  color: String
  pointTypes: [PointType!]!
  totalPoints: Int!
  createdAt: DateTime!
}

"""Aggregated point summary for a class or student over a period."""
type PointReport {
  id: ID!
  classId: ID!
  studentId: ID
  startDate: Date!
  endDate: Date!
  totalPoints: Int!
  positivePoints: Int!
  needsWorkPoints: Int!
  byPointType: JSON
  topBehaviors: [PointType!]!
  generatedAt: DateTime!
}

# ─────────────────────────────────────────
# Attendance Domain
# ─────────────────────────────────────────

"""A single student's attendance record for a session."""
type AttendanceRecord {
  id: ID!
  student: Student!
  attendance: Attendance!
  status: AttendanceStatus!
  note: String
  recordedAt: DateTime!
  recordedBy: Teacher!
}

"""A class attendance session (one per day or period)."""
type Attendance {
  id: ID!
  class: Class!
  date: Date!
  records: [AttendanceRecord!]!
  totalPresent: Int!
  totalAbsent: Int!
  totalLate: Int!
  completedAt: DateTime
  createdAt: DateTime!
}

# ─────────────────────────────────────────
# Lessons and Toolkit Domain
# ─────────────────────────────────────────

"""A short embedded instructional content unit for classroom use."""
type MiniLesson {
  id: ID!
  title: String!
  subject: String
  gradeRange: String
  durationMinutes: Int
  contentURL: URL
  thumbnailURL: URL
  skill: SkillDetails
  createdAt: DateTime!
}

"""A full lesson record with materials and objectives."""
type Lesson {
  id: ID!
  title: String!
  teacher: Teacher!
  class: Class
  subject: String
  gradeLevel: String
  objectives: [String!]!
  materials: [URL!]!
  miniLessons: [MiniLesson!]!
  durationMinutes: Int
  scheduledAt: DateTime
  completedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""A single Teacher Toolkit utility widget."""
type Widget {
  id: ID!
  type: WidgetType!
  name: String!
  class: Class!
  configuration: JSON
  lastUsedAt: DateTime
  usageCount: Int!
}

"""The Teacher Toolkit, a collection of classroom utility widgets."""
type Toolkit {
  id: ID!
  teacher: Teacher!
  class: Class
  widgets: [Widget!]!
  activeWidget: Widget
  updatedAt: DateTime!
}

# ─────────────────────────────────────────
# Skills Domain
# ─────────────────────────────────────────

"""A summary of a student's social-emotional learning skill performance."""
type SkillReport {
  id: ID!
  student: Student!
  skill: SkillDetails!
  startDate: Date!
  endDate: Date!
  totalPoints: Int!
  trend: String
  generatedAt: DateTime!
}

"""Definition and metadata for a social-emotional learning skill."""
type SkillDetails {
  id: ID!
  name: String!
  description: String
  category: String
  iconURL: URL
  color: String
  isCoreSEL: Boolean!
  relatedPointTypes: [PointType!]!
}

# ─────────────────────────────────────────
# Moments Domain
# ─────────────────────────────────────────

"""A highlighted classroom moment shared with a student's family."""
type Moment {
  id: ID!
  student: Student!
  teacher: Teacher!
  class: Class!
  mediaURL: URL!
  mediaType: String!
  caption: String
  sharedWithFamily: Boolean!
  capturedAt: DateTime!
  details: MomentDetails
}

"""Extended metadata for a classroom moment."""
type MomentDetails {
  id: ID!
  moment: Moment!
  skill: SkillDetails
  parentViewed: Boolean!
  parentViewedAt: DateTime
  likes: Int!
  tags: [String!]!
}

# ─────────────────────────────────────────
# Badges Domain
# ─────────────────────────────────────────

"""An achievement badge awarded to a student."""
type Badge {
  id: ID!
  student: Student!
  teacher: Teacher!
  awardedAt: DateTime!
  details: BadgeDetails!
}

"""Metadata and display information for a badge."""
type BadgeDetails {
  id: ID!
  name: String!
  description: String
  iconURL: URL!
  color: String
  category: String
  isCustom: Boolean!
  rarity: String
  createdAt: DateTime!
}

# ─────────────────────────────────────────
# Events Domain
# ─────────────────────────────────────────

"""A class or school event."""
type Event {
  id: ID!
  title: String!
  class: Class
  school: School
  organizer: Teacher!
  startAt: DateTime!
  endAt: DateTime
  location: String
  description: String
  details: EventDetails
  createdAt: DateTime!
}

"""Extended metadata for an event."""
type EventDetails {
  id: ID!
  event: Event!
  isAllDay: Boolean!
  recurrence: String
  attendeeCount: Int
  rsvpRequired: Boolean!
  rsvpDeadline: DateTime
  parentVisible: Boolean!
  reminderSentAt: DateTime
}

# ─────────────────────────────────────────
# Groups Domain
# ─────────────────────────────────────────

"""A small group of students within a class."""
type Group {
  id: ID!
  class: Class!
  name: String!
  students: [Student!]!
  totalPoints: Int!
  details: GroupDetails
  createdAt: DateTime!
}

"""Extended metadata and configuration for a student group."""
type GroupDetails {
  id: ID!
  group: Group!
  color: String
  iconURL: URL
  purpose: String
  isActive: Boolean!
  pointHistory: [DojoPoint!]!
  createdBy: Teacher!
}

# ─────────────────────────────────────────
# Room Domain
# ─────────────────────────────────────────

"""A physical or virtual room associated with a class or school."""
type Room {
  id: ID!
  name: String!
  school: School
  class: Class
  roomNumber: String
  capacity: Int
  isVirtual: Boolean!
  virtualURL: URL
  createdAt: DateTime!
}

# ─────────────────────────────────────────
# Activity Domain
# ─────────────────────────────────────────

"""An audit log entry representing a platform action."""
type Activity {
  id: ID!
  actorId: ID!
  actorType: String!
  action: String!
  targetId: ID
  targetType: String
  classId: ID
  schoolId: ID
  metadata: JSON
  occurredAt: DateTime!
}

# ─────────────────────────────────────────
# Developer Integration Domain
# ─────────────────────────────────────────

"""A developer API key for authenticating programmatic requests."""
type APIKey {
  id: ID!
  teacher: Teacher!
  name: String!
  keyPrefix: String!
  scopes: [String!]!
  lastUsedAt: DateTime
  expiresAt: DateTime
  createdAt: DateTime!
  revokedAt: DateTime
}

"""An OAuth or session token for authenticated API access."""
type Token {
  id: ID!
  type: TokenType!
  scopes: [String!]!
  userId: ID!
  userType: String!
  issuedAt: DateTime!
  expiresAt: DateTime!
  revokedAt: DateTime
}

"""A webhook subscription for receiving ClassDojo event notifications."""
type Webhook {
  id: ID!
  teacher: Teacher!
  url: URL!
  events: [WebhookEvent!]!
  secret: String!
  isActive: Boolean!
  lastDeliveryAt: DateTime
  lastDeliveryStatus: Int
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ─────────────────────────────────────────
# Root Query
# ─────────────────────────────────────────

type Query {
  class(id: ID!): Class
  classes(teacherId: ID, schoolId: ID): [Class!]!
  classCode(code: String!): ClassCode

  teacher(id: ID!): Teacher
  teachers(schoolId: ID): [Teacher!]!

  student(id: ID!): Student
  students(classId: ID!): [Student!]!
  studentReport(studentId: ID!, startDate: Date!, endDate: Date!): StudentReport

  parent(id: ID!): Parent
  parents(studentId: ID, classId: ID): [Parent!]!

  school(id: ID!): School
  schools(districtId: ID): [School!]!

  message(id: ID!): Message
  messageThread(id: ID!): MessageThread
  messageThreads(teacherId: ID, parentId: ID): [MessageThread!]!

  classStory(classId: ID!): ClassStory
  storyPost(id: ID!): StoryPost

  portfolio(studentId: ID!): Portfolio
  portfolioItem(id: ID!): PortfolioItem

  dojoPoint(id: ID!): DojoPoint
  dojoPoints(studentId: ID, classId: ID, startDate: Date, endDate: Date): [DojoPoint!]!
  pointTypes(classId: ID!): [PointType!]!
  pointReport(classId: ID!, studentId: ID, startDate: Date!, endDate: Date!): PointReport

  attendance(classId: ID!, date: Date!): Attendance
  attendanceRecords(studentId: ID!, startDate: Date!, endDate: Date!): [AttendanceRecord!]!

  lesson(id: ID!): Lesson
  lessons(teacherId: ID, classId: ID): [Lesson!]!
  miniLesson(id: ID!): MiniLesson
  toolkit(teacherId: ID, classId: ID): Toolkit

  skillDetails(id: ID!): SkillDetails
  skillReport(studentId: ID!, skillId: ID!, startDate: Date!, endDate: Date!): SkillReport

  moment(id: ID!): Moment
  moments(studentId: ID, classId: ID): [Moment!]!

  badge(id: ID!): Badge
  badges(studentId: ID!): [Badge!]!

  event(id: ID!): Event
  events(classId: ID, schoolId: ID): [Event!]!

  group(id: ID!): Group
  groups(classId: ID!): [Group!]!

  room(id: ID!): Room
  rooms(schoolId: ID, classId: ID): [Room!]!

  activity(id: ID!): Activity
  activities(classId: ID, actorId: ID, startDate: Date, endDate: Date): [Activity!]!

  apiKeys(teacherId: ID!): [APIKey!]!
  webhooks(teacherId: ID!): [Webhook!]!
}

# ─────────────────────────────────────────
# Root Mutation
# ─────────────────────────────────────────

type Mutation {
  createClass(teacherId: ID!, name: String!, grade: String, subject: String): Class!
  updateClass(id: ID!, name: String, grade: String, subject: String): Class!
  archiveClass(id: ID!): Class!

  addStudent(classId: ID!, firstName: String!, lastName: String): Student!
  updateStudent(id: ID!, firstName: String, lastName: String, displayName: String): Student!
  removeStudent(classId: ID!, studentId: ID!): Boolean!

  awardPoints(studentId: ID!, classId: ID!, pointTypeId: ID!, value: Int!, note: String): DojoPoint!
  createPointType(classId: ID!, name: String!, polarity: PointPolarity!, color: String): PointType!

  recordAttendance(classId: ID!, date: Date!, records: [AttendanceInput!]!): Attendance!

  sendMessage(threadId: ID!, body: String!, attachments: [URL!]): Message!
  createMessageThread(teacherId: ID!, parentId: ID!, studentId: ID): MessageThread!

  createStoryPost(classId: ID!, body: String, mediaURLs: [URL!]): StoryPost!
  addStoryComment(postId: ID!, body: String!): StoryComment!

  addPortfolioItem(studentId: ID!, mediaURL: URL!, mediaType: String!, title: String, description: String): PortfolioItem!

  createGroup(classId: ID!, name: String!, studentIds: [ID!]!): Group!
  updateGroup(id: ID!, name: String, studentIds: [ID!]): Group!

  createEvent(classId: ID, schoolId: ID, title: String!, startAt: DateTime!, endAt: DateTime, location: String): Event!

  awardBadge(studentId: ID!, badgeDetailsId: ID!): Badge!

  createWebhook(teacherId: ID!, url: URL!, events: [WebhookEvent!]!): Webhook!
  deleteWebhook(id: ID!): Boolean!

  createAPIKey(teacherId: ID!, name: String!, scopes: [String!]!): APIKey!
  revokeAPIKey(id: ID!): APIKey!
}

# ─────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────

input AttendanceInput {
  studentId: ID!
  status: AttendanceStatus!
  note: String
}
