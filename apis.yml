aid: classdojo
name: ClassDojo
description: >-
  ClassDojo is a San Francisco-based education technology company that builds
  a classroom communication and behavior management platform connecting
  teachers, students, and families. The core ClassDojo product enables
  teachers to share photos, videos, and messages with parents; track
  social-emotional learning through Points and Big Ideas; manage attendance,
  timers, and classroom utilities via the Teacher Toolkit; and translate
  parent-teacher messages into 190+ languages. The platform serves more than
  50 million teachers, students, and families globally and remains free for
  teachers. ClassDojo also offers Dojo Islands (adventure-based learning),
  Dojo Tutor (math, reading, dyslexia, and ESL tutoring), Dojo Sparks, and
  ClassDojo Plus as premium experiences for families. The company's revenue
  model is consumer subscriptions and tutoring; there is no public developer
  API, OpenAPI specification, SDK, or webhook surface, and the GitHub
  organization at github.com/classdojo publishes only internal utilities,
  forks, and policy documents rather than developer-facing artifacts.
